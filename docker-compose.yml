version: '3.8'

services:

  db:
    image: postgres:15
    environment:
      POSTGRES_DB: portfolio
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    volumes:
      - pgdata:/var/lib/postgresql/data

  web:
    build: .
    ports:
      - "5050:5050"
    environment:
      DB_HOST: db
      DB_NAME: portfolio
      DB_USER: admin
      DB_PASSWORD: password
    depends_on:
      - db


volumes:
  pgdata:
